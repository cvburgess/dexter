name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - 'src/**'
  workflow_dispatch:

# Serialize production deploys: never run migrations / function deploys /
# EAS steps concurrently against the same project. Queue superseded runs
# rather than cancel them — cancelling mid-migration could leave prod in a
# half-applied state.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      supabase: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.supabase == 'true' }}
      src: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.src == 'true' }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            supabase:
              - 'supabase/**'
            src:
              - 'src/**'

  migrate:
    name: Apply Migrations
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase Project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }} --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply Migrations
        run: supabase db push --password ${{ secrets.SUPABASE_DB_PASSWORD }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-functions:
    name: Deploy Edge Functions
    needs: [changes, migrate]
    if: needs.changes.outputs.supabase == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: supabase functions deploy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-eas:
    name: Deploy to EAS
    needs: [changes, migrate, deploy-functions]
    if: always() && needs.changes.outputs.src == 'true' && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped') && (needs['deploy-functions'].result == 'success' || needs['deploy-functions'].result == 'skipped')
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.EXPO_PUBLIC_SENTRY_DSN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Export Web App
        working-directory: src
        run: npm run export:web

      - name: Deploy Web App
        working-directory: src
        run: eas deploy --prod

      - name: Publish OTA Update
        working-directory: src
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual deploy' }}
        run: eas update --channel production --message "$COMMIT_MESSAGE" --non-interactive
