# ---------- Database ----------

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

# ---------- API ----------

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ---------- Auth ----------

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["exp://localhost:8081"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

# ---------- Storage ----------

[storage]
enabled = true
file_size_limit = "50MiB"

# ---------- Analytics ----------

[analytics]
enabled = false

# ---------- Edge Functions ----------

[functions.ics-proxy]
enabled = true
verify_jwt = false
import_map = "./functions/ics-proxy/deno.json"
entrypoint = "./functions/ics-proxy/index.ts"

[functions.mcp-server]
enabled = true
verify_jwt = false
import_map = "./functions/mcp-server/deno.json"
entrypoint = "./functions/mcp-server/index.ts"
