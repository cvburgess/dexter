# ---------- Database ----------

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

# ---------- API ----------

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

# ---------- Realtime ----------

[realtime]
enabled = true

# ---------- Auth ----------

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = [
  "exp://localhost:8081",
  "dexter://auth-callback",
  "http://localhost:8081/auth-callback",
]
jwt_expiry = 3600
enable_signup = true

# OAuth 2.1 authorization server for MCP / third-party integrations. Supabase
# redirects authorizing clients to {site_url}{authorization_url_path} (the
# Expo web route at src/app/oauth/consent.tsx). Dynamic client registration is
# off, so every MCP client must be pre-registered with its redirect URI before
# authorization succeeds (see docs/backend.md).
[auth.oauth_server]
enabled = true
authorization_url_path = "/oauth/consent"
allow_dynamic_registration = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

# Mirrors the hosted project's Google provider (see the Supabase dashboard).
# DO NOT commit the OAuth secret — it is read from the environment.
[auth.external.google]
enabled = true
client_id = "218947795156-k6ov628icbb021i4e0src54p2j5v798b.apps.googleusercontent.com"
secret = "env(SUPABASE_AUTH_GOOGLE_SECRET)"
redirect_uri = "https://api.dexterplanner.com/auth/v1/callback"

# ---------- Storage ----------

[storage]
enabled = true
file_size_limit = "50MiB"

# ---------- Analytics ----------

[analytics]
enabled = false

# ---------- Edge Functions ----------

[functions.ics-proxy]
enabled = true
verify_jwt = false
import_map = "./functions/ics-proxy/deno.json"
entrypoint = "./functions/ics-proxy/index.ts"

[functions.mcp-server]
enabled = true
verify_jwt = false
import_map = "./functions/mcp-server/deno.json"
entrypoint = "./functions/mcp-server/index.ts"
